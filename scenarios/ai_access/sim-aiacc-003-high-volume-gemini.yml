scenario_id: SIM-AIACC-003
name: "AI Access — High-Volume Gemini Prompt Burst from Single User"
version: "1.1"
status: active

plane: AI_ACCESS
detection_types:
  - Analytics

uc_ref: UCS-AIACC-03
tc_ref: TC-AIACC-03
uc_name: "Anomalous AI Provider Usage Volume"
tc_name: "Burst of Outbound Prompts to Google Gemini API"

mitre_tactic: "TA0010"
mitre_tactic_name: "Exfiltration"
mitre_technique: "T1567"
mitre_technique_name: "Exfiltration Over Web Service"

threat_report: "Unit42 - Generative AI Misuse Patterns"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight DNS resolution for generativelanguage.googleapis.com"
    command: |
      getent hosts generativelanguage.googleapis.com || true
      echo "[CortexSim] burst target reachable"
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "Pre-flight: provider host resolvable from worker"

  - id: step-02
    name: "Fire 30 sequential prompts to trigger volume baseline"
    command: |
      cat > /tmp/aiacc-003.yml <<'YML'
      campaign_id: CMP-AIACC-003
      name: "AI Access — Gemini burst"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - generativelanguage.googleapis.com
      dry_run: false
      tags: [ai-access, gemini, volume-anomaly]
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: gemini
            payload_type: benign
            iterations: 30
            sleep_seconds: 2
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-003.yml --live
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — request rate per user exceeds rolling baseline (30 in <90s)"
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — sustained generative-AI session count from single src IP"
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — sanctioned-vs-unsanctioned-AI policy: Gemini classified as unsanctioned for this user"

  - id: step-03
    name: "Cool-off window then a single probe to confirm baseline restoration"
    command: |
      echo "[CortexSim] sleeping 120s to allow baseline restoration"
      sleep 120
      cat > /tmp/aiacc-003-cool.yml <<'YML'
      campaign_id: CMP-AIACC-003
      name: "AI Access — Gemini cool-off probe"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - generativelanguage.googleapis.com
      dry_run: false
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: gemini
            payload_type: benign
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-003-cool.yml --live
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — single post-cooloff request below baseline, no detection"

cleanup:
  commands:
    - "rm -f /tmp/aiacc-003.yml /tmp/aiacc-003-cool.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-07"
tags:
  - ai-access
  - gemini
  - volume-anomaly
  - shadow-ai
  - eal-plugin
