scenario_id: SIM-AIACC-004
name: "AI Access — Jailbreak Prompt Fingerprint Detection"
version: "1.1"
status: active

plane: AI_ACCESS
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-AIACC-04
tc_ref: TC-AIACC-04
uc_name: "Jailbreak Prompt Content Classification"
tc_name: "DAN-Style Jailbreak Prompt Submitted to Public LLM"

mitre_tactic: "TA0001"
mitre_tactic_name: "Initial Access"
mitre_technique: "T1656"
mitre_technique_name: "Impersonation"
additional_techniques:
  - technique: "T1567"
    name: "Exfiltration Over Web Service"

threat_report: "Unit42 - Prompt Injection and Jailbreak Trends"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm jailbreak payload contains DAN markers"
    command: |
      python3 -c "
      from core.eal_simulator.plugins.llm_provider_egress import _render_payload
      p = _render_payload('jailbreak')
      assert 'DAN' in p and 'Ignore all previous' in p
      print('jailbreak markers present')
      " || echo "[CortexSim] payload self-check (best-effort)"
    identity: container-runtime
    mitre_technique: "T1656"
    expected_detections:
      - plane: AI_ACCESS
        type: BIOC
        description: "Pre-flight: jailbreak payload contains 'DAN' and 'Ignore all previous instructions' markers"
        ttp_ref: TTP-2026-0010
        detection_id: bioc-aiacc-004-pre-flight-jailbreak-payload-contains-dan-markers

  - id: step-02
    name: "Single jailbreak POST to api.openai.com via EAL plugin"
    command: |
      cat > /tmp/aiacc-004.yml <<'YML'
      campaign_id: CMP-AIACC-004
      name: "AI Access — jailbreak fingerprint"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.openai.com
      dry_run: false
      tags: [ai-access, jailbreak, openai]
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: openai
            payload_type: jailbreak
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-004.yml --live
    identity: container-runtime
    mitre_technique: "T1656"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — content classifier flags jailbreak fingerprint (DAN, Ignore previous instructions, role-play frames)"
        ttp_ref: TTP-2026-0010
        detection_id: xql-aiacc-004-jailbreak-fingerprint-dan-ignore-previous-instructions
      - plane: AI_ACCESS
        type: BIOC
        description: "AI Access — outbound prompt requests circumvention of corporate DLP — policy violation"
        ttp_ref: TTP-2026-0010
        detection_id: bioc-aiacc-004-outbound-prompt-requests-dlp-circumvention-policy-violation

  - id: step-03
    name: "Repeat across two providers to validate detector breadth"
    command: |
      for prov in openai anthropic; do
        cat > /tmp/aiacc-004-$prov.yml <<YML
      campaign_id: CMP-AIACC-004
      name: "AI Access — jailbreak across provider $prov"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.openai.com
        - api.anthropic.com
      dry_run: false
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: $prov
            payload_type: jailbreak
            iterations: 2
            sleep_seconds: 2
      YML
        python3 -m scripts.eal_simulator.cli run /tmp/aiacc-004-$prov.yml --live
      done
    identity: container-runtime
    mitre_technique: "T1656"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — jailbreak detection consistent across multiple providers"
        ttp_ref: TTP-2026-0010
        detection_id: xql-aiacc-004-jailbreak-detection-consistent-across-providers

cleanup:
  commands:
    - "rm -f /tmp/aiacc-004*.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-07"
tags:
  - ai-access
  - jailbreak
  - prompt-injection
  - openai
  - anthropic
  - eal-plugin
