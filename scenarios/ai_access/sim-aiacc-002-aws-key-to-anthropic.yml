scenario_id: SIM-AIACC-002
name: "AI Access — AWS Access Key Leaked to Anthropic API"
version: "1.1"
status: active

plane: AI_ACCESS
detection_types:
  - Analytics
  - BIOC
  - IOC

uc_ref: UCS-AIACC-02
tc_ref: TC-AIACC-02
uc_name: "Cloud Credential Disclosure to External LLM"
tc_name: "AWS Access Key in Prompt Body to api.anthropic.com"

mitre_tactic: "TA0006"
mitre_tactic_name: "Credential Access"
mitre_technique: "T1552"
mitre_technique_name: "Unsecured Credentials"
additional_techniques:
  - technique: "T1567"
    name: "Exfiltration Over Web Service"

threat_report: "Unit42 - Cloud Credentials in LLM Prompts"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm secret payload contains the canary AKIA key"
    command: |
      python3 -c "
      from core.eal_simulator.plugins.llm_provider_egress import _render_payload
      assert 'AKIA0000CORTEXSIMCANARY' in _render_payload('secret')
      print('canary marker present in secret payload')
      " || echo "[CortexSim] payload self-check (best-effort)"
    identity: container-runtime
    mitre_technique: "T1552.001"
    expected_detections:
      - plane: AI_ACCESS
        type: BIOC
        description: "Pre-flight: secret payload contains AKIA-prefixed canary"
        ttp_ref: TTP-2026-0008
        detection_id: bioc-aiacc-002-pre-flight-secret-payload-contains-akia-canary

  - id: step-02
    name: "Single secret POST to api.anthropic.com via EAL plugin"
    command: |
      cat > /tmp/aiacc-002.yml <<'YML'
      campaign_id: CMP-AIACC-002
      name: "AI Access — AWS key leak to Anthropic"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.anthropic.com
      dry_run: false
      tags: [ai-access, anthropic, secret-dlp]
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: anthropic
            payload_type: secret
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-002.yml --live
    identity: container-runtime
    mitre_technique: "T1552"
    expected_detections:
      - plane: AI_ACCESS
        type: IOC
        description: "AI Access — DLP regex match: AKIA-prefixed AWS access key in outbound LLM prompt"
        ttp_ref: TTP-2026-0008
        detection_id: ioc-cloud-account-id-akia-0-9a-z-16
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — POST to api.anthropic.com from non-sanctioned user context"
        ttp_ref: TTP-2026-0008
        detection_id: xql-aiacc-002-post-to-anthropic-from-non-sanctioned-user-context
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — generative-ai App-ID match on outbound HTTPS to anthropic.com"
        ttp_ref: TTP-2026-0008
        detection_id: xql-aiacc-002-ngfw-generative-ai-app-id-outbound-https-to-anthropic

  - id: step-03
    name: "Verify per-session block-action policy (4 attempts)"
    command: |
      cat > /tmp/aiacc-002-burst.yml <<'YML'
      campaign_id: CMP-AIACC-002
      name: "AI Access — secret burst"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.anthropic.com
      dry_run: false
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: anthropic
            payload_type: secret
            iterations: 4
            sleep_seconds: 3
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-002-burst.yml --live
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — block-action policy fires after first DLP hit, subsequent sessions denied"
        ttp_ref: TTP-2026-0008
        detection_id: xql-aiacc-002-repeated-secret-egress-to-anthropic-block-policy-trigger

cleanup:
  commands:
    - "rm -f /tmp/aiacc-002.yml /tmp/aiacc-002-burst.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-07"
tags:
  - ai-access
  - secrets-dlp
  - anthropic
  - aws-credentials
  - eal-plugin
