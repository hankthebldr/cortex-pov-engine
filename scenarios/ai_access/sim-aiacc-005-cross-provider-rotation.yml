scenario_id: SIM-AIACC-005
name: "AI Access — Cross-Provider Rotation (OpenAI → Gemini → Anthropic)"
version: "1.1"
status: active

plane: AI_ACCESS
detection_types:
  - Analytics

uc_ref: UCS-AIACC-05
tc_ref: TC-AIACC-05
uc_name: "Cross-Provider Behaviour Stitching"
tc_name: "Single User Rotates Across Three AI Providers in <5 min"

mitre_tactic: "TA0005"
mitre_tactic_name: "Defense Evasion"
mitre_technique: "T1090"
mitre_technique_name: "Proxy"
additional_techniques:
  - technique: "T1567"
    name: "Exfiltration Over Web Service"

threat_report: "Unit42 - AI Provider Hopping for Policy Evasion"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Provider 1 — OpenAI"
    command: |
      cat > /tmp/aiacc-005-openai.yml <<'YML'
      campaign_id: CMP-AIACC-005
      name: "AI Access — rotation step 1 OpenAI"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.openai.com
      dry_run: false
      tags: [ai-access, cross-provider, rotation]
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: openai
            payload_type: source
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-005-openai.yml --live
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — first egress to api.openai.com, user marked active in provider matrix"
        ttp_ref: TTP-2026-0011
        detection_id: xql-aiacc-005-first-egress-to-openai-user-active-in-provider-matrix

  - id: step-02
    name: "Provider 2 — Gemini (overlapping content within 60s)"
    command: |
      sleep 30
      cat > /tmp/aiacc-005-gemini.yml <<'YML'
      campaign_id: CMP-AIACC-005
      name: "AI Access — rotation step 2 Gemini"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - generativelanguage.googleapis.com
      dry_run: false
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: gemini
            payload_type: source
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-005-gemini.yml --live
    identity: container-runtime
    mitre_technique: "T1090"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — same user observed at second provider (Gemini) within rotation window"
        ttp_ref: TTP-2026-0011
        detection_id: xql-aiacc-005-same-user-second-provider-gemini-within-rotation-window

  - id: step-03
    name: "Provider 3 — Anthropic completes the rotation triangle"
    command: |
      sleep 30
      cat > /tmp/aiacc-005-anthropic.yml <<'YML'
      campaign_id: CMP-AIACC-005
      name: "AI Access — rotation step 3 Anthropic"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.anthropic.com
      dry_run: false
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: anthropic
            payload_type: source
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-005-anthropic.yml --live
    identity: container-runtime
    mitre_technique: "T1090"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — three providers within 5 min from same user — provider-hopping policy evasion alert"
        ttp_ref: TTP-2026-0011
        detection_id: xql-aiacc-005-three-providers-within-five-minutes-provider-hopping
      - plane: ANALYTICS
        type: Analytics
        description: "XSIAM stitching — single user identity correlates the three provider sessions into one incident"
        ttp_ref: TTP-2026-0011
        detection_id: xql-aiacc-005-xsiam-stitch-single-user-three-provider-sessions
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — generative-AI App-ID across three FQDNs sharing X-Simulation-Run-ID prefix"
        ttp_ref: TTP-2026-0011
        detection_id: xql-aiacc-005-ngfw-generative-ai-app-id-across-three-fqdns-shared-run-id

cleanup:
  commands:
    - "rm -f /tmp/aiacc-005-*.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-07"
tags:
  - ai-access
  - cross-provider
  - stitching
  - policy-evasion
  - eal-plugin
