scenario_id: SIM-AIACC-001
name: "AI Access — Source Code Paste to Public ChatGPT"
version: "1.1"
status: active

plane: AI_ACCESS
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-AIACC-01
tc_ref: TC-AIACC-01
uc_name: "Shadow-AI Source Code Disclosure"
tc_name: "Multi-File Source Code Paste to OpenAI ChatGPT API"

mitre_tactic: "TA0010"
mitre_tactic_name: "Exfiltration"
mitre_technique: "T1567"
mitre_technique_name: "Exfiltration Over Web Service"
additional_techniques:
  - technique: "T1041"
    name: "Exfiltration Over C2 Channel"

threat_report: "Unit42 - Shadow AI in the Enterprise"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm llm_provider_egress plugin is registered"
    command: |
      python3 -m scripts.eal_simulator.cli describe llm_provider_egress \
        | jq -e '.eal_targets | length > 0'
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: BIOC
        description: "Pre-flight: plugin metadata visible to operator"
        ttp_ref: TTP-2026-0007
        detection_id: bioc-aiacc-001-pre-flight-llm-provider-egress-plugin-registered

  - id: step-02
    name: "Single source-code POST to api.openai.com via EAL plugin"
    command: |
      cat > /tmp/aiacc-001.yml <<'YML'
      campaign_id: CMP-AIACC-001
      name: "AI Access — source paste to OpenAI"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.openai.com
      dry_run: false
      tags: [ai-access, openai, source-paste]
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: openai
            payload_type: source
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-001.yml --live
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — outbound POST to api.openai.com containing source-code shape (CORTEXSIM-CANARY marker)"
        ttp_ref: TTP-2026-0007
        detection_id: xql-aiacc-001-source-code-shape-post-to-openai-with-canary-marker
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — DLP regex match on source-code structure in prompt body"
        ttp_ref: TTP-2026-0007
        detection_id: xql-aiacc-001-dlp-source-code-structure-regex-match-in-llm-prompt
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — generative-AI App-ID match on outbound HTTPS to api.openai.com"
        ttp_ref: TTP-2026-0007
        detection_id: xql-aiacc-001-ngfw-generative-ai-app-id-outbound-https-to-openai

  - id: step-03
    name: "Repeated POSTs (x3) to confirm stable per-session detection"
    command: |
      cat > /tmp/aiacc-001-burst.yml <<'YML'
      campaign_id: CMP-AIACC-001
      name: "AI Access — source paste burst"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - api.openai.com
      dry_run: false
      steps:
        - step_id: step-01
          plugin: llm_provider_egress
          params:
            provider: openai
            payload_type: source
            iterations: 3
            sleep_seconds: 5
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/aiacc-001-burst.yml --live
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: AI_ACCESS
        type: Analytics
        description: "AI Access — repeated POST pattern (3 in <60s) flagged as policy violation"
        ttp_ref: TTP-2026-0007
        detection_id: xql-aiacc-001-repeated-source-paste-burst-to-openai-single-user

cleanup:
  commands:
    - "rm -f /tmp/aiacc-001.yml /tmp/aiacc-001-burst.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-07"
tags:
  - ai-access
  - shadow-ai
  - openai
  - source-code-dlp
  - eal-plugin
