scenario_id: SIM-BROWSER-004
name: "Browser — Cross-Origin SaaS Copy-Paste DLP"
version: "1.1"
status: active

plane: BROWSER
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-BROWSER-04
tc_ref: TC-BROWSER-04
uc_name: "Cross-SaaS Data Movement Detection"
tc_name: "User Copies from Sanctioned CRM, Pastes Into Personal Webmail"

mitre_tactic: "TA0010"
mitre_tactic_name: "Exfiltration"
mitre_technique: "T1567"
mitre_technique_name: "Exfiltration Over Web Service"

threat_report: "Unit42 - Insider Risk via Browser Exfil 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-browser-attacker"

infra_modules_needed:
  - base

external_tools:
  - name: Cortex Browser Attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false
    adapter_ref: TOOL-CORTEX-BROWSER-ATTACKER
  - name: cortex-browser-attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: binary
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm browser_attack_runner plugin is registered"
    command: |
      python3 -m scripts.eal_simulator.cli describe browser_attack_runner \
        | jq -e '.eal_targets | length > 0'
    identity: container-runtime
    mitre_technique: "T1005"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "Pre-flight: plugin metadata visible to operator"

  - id: step-02
    name: "Drive Prisma Browser: copy from CRM, paste into webmail"
    command: |
      cat > /tmp/sim-browser-004-eal.yml <<'YML'
      campaign_id: CMP-BROWSER-004
      name: "Browser — cross-origin DLP"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - crm.cortexsim-test.invalid
        - mail.cortexsim-test.invalid
      dry_run: false
      tags: [browser, dlp, cross-origin]
      steps:
        - step_id: step-01
          plugin: browser_attack_runner
          params:
            campaign_path: scenarios/browser/campaigns/saas-cross-origin-dlp.yml
            allowlist_host: crm.cortexsim-test.invalid
            browser_channel: prisma
            headless: true
            timeout_seconds: 120.0
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/sim-browser-004-eal.yml --live
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: BROWSER
        type: BIOC
        description: "Prisma Browser — cross-origin paste from sanctioned CRM into personal webmail (DLP rule)"
      - plane: BROWSER
        type: Analytics
        description: "Prisma Browser — clipboard origin tag mismatch with paste destination origin"
      - plane: ANALYTICS
        type: Analytics
        description: "XSIAM stitching — copy + paste correlated by clipboard payload hash"

  - id: step-03
    name: "Confirm PB → XSIAM stitched alert"
    command: |
      echo "[CortexSim] Confirm XSIAM stitched incident: clipboard-origin mismatch."
    identity: container-runtime
    mitre_technique: "T1567"
    expected_detections:
      - plane: ANALYTICS
        type: Analytics
        description: "XSIAM — stitched cross-origin DLP incident with both origins on the timeline"

cleanup:
  commands:
    - "rm -f /tmp/sim-browser-004-eal.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-08"
tags:
  - browser
  - prisma-browser
  - dlp
  - cross-origin
  - exfiltration
  - eal-plugin
