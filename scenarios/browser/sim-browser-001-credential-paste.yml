scenario_id: SIM-BROWSER-001
name: "Browser — Credential Paste into Untrusted Origin"
version: "1.1"
status: active

plane: BROWSER
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-BROWSER-01
tc_ref: TC-BROWSER-01
uc_name: "Browser DLP — Credential Disclosure"
tc_name: "User Pastes SSO Credential Pattern Into Non-Sanctioned Form"

mitre_tactic: "TA0006"
mitre_tactic_name: "Credential Access"
mitre_technique: "T1552"
mitre_technique_name: "Unsecured Credentials"

threat_report: "Unit42 - Credential Phishing Trends 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-browser-attacker"

infra_modules_needed:
  - base

external_tools:
  - name: cortex-browser-attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: binary
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm cortex-browser-attacker is registered"
    command: |
      python3 -m scripts.eal_simulator.cli describe browser_attack_runner \
        | jq -e '.eal_targets | length > 0'
    identity: container-runtime
    mitre_technique: "T1552"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "Pre-flight: plugin metadata visible to operator"

  - id: step-02
    name: "Drive Prisma Browser to phishing form via browser_attack_runner"
    command: |
      cat > /tmp/sim-browser-001-eal.yml <<'YML'
      campaign_id: CMP-BROWSER-001
      name: "Browser — credential paste"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - login.cortexsim-test.invalid
      dry_run: false
      tags: [browser, prisma-browser, credential-paste]
      steps:
        - step_id: step-01
          plugin: browser_attack_runner
          params:
            campaign_path: scenarios/browser/campaigns/cred-paste.yml
            allowlist_host: login.cortexsim-test.invalid
            browser_channel: prisma
            headless: true
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/sim-browser-001-eal.yml --live
    identity: container-runtime
    mitre_technique: "T1552"
    expected_detections:
      - plane: BROWSER
        type: BIOC
        description: "Prisma Browser — credential-shape paste into non-sanctioned origin (DLP rule)"
      - plane: BROWSER
        type: Analytics
        description: "Prisma Browser — paste source vs. destination origin mismatch"

  - id: step-03
    name: "Verify PB → XSIAM telemetry path delivered the alert"
    command: |
      echo "[CortexSim] Confirm corresponding alert in XSIAM (manual step)."
      echo "[CortexSim] XQL: dataset = prisma_browser_dlp"
      echo "[CortexSim]      | filter cortex_canary = 'CANARY-CRED-001'"
    identity: container-runtime
    mitre_technique: "T1552"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "PB → XSIAM — alert with origin URL + paste DLP rule fires within MTTD target"

cleanup:
  commands:
    - "rm -f /tmp/sim-browser-001-eal.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-08"
tags:
  - browser
  - prisma-browser
  - dlp
  - credential
  - eal-plugin
