scenario_id: SIM-BROWSER-001
name: "Browser — Credential Paste into Untrusted Origin"
version: "1.0"
status: draft

plane: BROWSER
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-BROWSER-01
tc_ref: TC-BROWSER-01
uc_name: "Browser DLP — Credential Disclosure"
tc_name: "User Pastes SSO Credential Pattern Into Non-Sanctioned Form"

mitre_tactic: "TA0006"
mitre_tactic_name: "Credential Access"
mitre_technique: "T1552"
mitre_technique_name: "Unsecured Credentials"

threat_report: "Unit42 - Credential Phishing Trends 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-browser-attacker"

infra_modules_needed:
  - base

external_tools:
  - name: cortex-browser-attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: binary
    install_inline: false

steps:
  - id: step-01
    name: "Launch managed Prisma Browser session via cortex-browser-attacker"
    command: |
      cortex-browser-attacker run \
        --campaign scenarios/browser/campaigns/cred_paste.yml \
        --headless --browser-channel prisma \
        --out /tmp/browser-001-events.jsonl
    identity: container-runtime
    mitre_technique: "T1552"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "Pre-flight: managed Prisma Browser session opens, telemetry stream live"

  - id: step-02
    name: "Navigate to a synthetic phishing form and paste credential"
    command: |
      # Driven by Playwright inside cortex-browser-attacker; the action types
      # a credential-shaped string into an input on a non-sanctioned origin.
      cortex-browser-attacker action paste \
        --target-url https://login.cortexsim-test.invalid/signin \
        --selector 'input[name="password"]' \
        --content "MyCorpSSO!@#-CORTEXSIM-CANARY-2026" \
        --emit-event
    identity: container-runtime
    mitre_technique: "T1552"
    expected_detections:
      - plane: BROWSER
        type: BIOC
        description: "Prisma Browser — credential-shaped paste into non-sanctioned origin (DLP rule)"
      - plane: BROWSER
        type: Analytics
        description: "Prisma Browser — paste source (clipboard) flagged when target origin not in SaaS allowlist"

  - id: step-03
    name: "Verify PB → XSIAM telemetry path delivered the alert"
    command: |
      # Operator confirms in XSIAM UI; this step fingerprints the event in
      # our local log so the run report can correlate to the XSIAM incident.
      jq -r 'select(.action=="paste" and .target_url|contains("invalid")) | .timestamp' \
        /tmp/browser-001-events.jsonl
      echo "[CortexSim] confirm corresponding alert in XSIAM (manual)"
    identity: container-runtime
    mitre_technique: "T1552"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "PB → XSIAM — alert with origin URL + paste DLP rule fires within MTTD target"

cleanup:
  commands:
    - "rm -f /tmp/browser-001-events.jsonl"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-05"
tags:
  - browser
  - prisma-browser
  - dlp
  - credential
