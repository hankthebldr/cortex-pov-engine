scenario_id: SIM-BROWSER-005
name: "Browser — Screen Capture of Sensitive SaaS Page"
version: "1.1"
status: active

plane: BROWSER
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-BROWSER-05
tc_ref: TC-BROWSER-05
uc_name: "Browser Screen-Capture Policy Enforcement"
tc_name: "Programmatic Screenshot of Sanctioned SaaS Detail Page"

mitre_tactic: "TA0009"
mitre_tactic_name: "Collection"
mitre_technique: "T1113"
mitre_technique_name: "Screen Capture"

threat_report: "Unit42 - Insider Screen-Capture Tradecraft 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-browser-attacker"

infra_modules_needed:
  - base

external_tools:
  - name: cortex-browser-attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: binary
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm browser_attack_runner plugin is registered"
    command: |
      python3 -m scripts.eal_simulator.cli describe browser_attack_runner \
        | jq -e '.eal_targets | length > 0'
    identity: container-runtime
    mitre_technique: "T1113"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "Pre-flight: plugin metadata visible to operator"

  - id: step-02
    name: "Drive Prisma Browser to sensitive page and attempt screen captures"
    command: |
      cat > /tmp/sim-browser-005-eal.yml <<'YML'
      campaign_id: CMP-BROWSER-005
      name: "Browser — screen capture"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - crm.cortexsim-test.invalid
      dry_run: false
      tags: [browser, screen-capture]
      steps:
        - step_id: step-01
          plugin: browser_attack_runner
          params:
            campaign_path: scenarios/browser/campaigns/screen-capture.yml
            allowlist_host: crm.cortexsim-test.invalid
            browser_channel: prisma
            headless: true
            timeout_seconds: 90.0
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/sim-browser-005-eal.yml --live
    identity: container-runtime
    mitre_technique: "T1113"
    expected_detections:
      - plane: BROWSER
        type: BIOC
        description: "Prisma Browser — page.screenshot() called against origin tagged sensitive — block + alert"
      - plane: BROWSER
        type: Analytics
        description: "Prisma Browser — screen-capture-attempt counter increments under sensitive-content policy"

  - id: step-03
    name: "Confirm repeat-capture risk-score elevation"
    command: |
      echo "[CortexSim] Confirm XSIAM: user risk score elevated after repeat screen-capture attempt."
    identity: container-runtime
    mitre_technique: "T1113"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "Prisma Browser — repeat screen-capture from same user counts toward elevated risk score"
      - plane: ANALYTICS
        type: Analytics
        description: "XSIAM — user risk score elevated, conditional-access policy triggered downstream"

cleanup:
  commands:
    - "rm -f /tmp/sim-browser-005-eal.yml /tmp/browser-005-cap*.png"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-08"
tags:
  - browser
  - prisma-browser
  - screen-capture
  - collection
  - eal-plugin
