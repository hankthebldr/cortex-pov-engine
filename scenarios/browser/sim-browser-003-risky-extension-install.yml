scenario_id: SIM-BROWSER-003
name: "Browser — Sideloaded Risky Chrome Extension"
version: "1.1"
status: active

plane: BROWSER
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-BROWSER-03
tc_ref: TC-BROWSER-03
uc_name: "Managed-Browser Extension Risk Policy"
tc_name: "Sideloaded .crx with Overbroad Permissions Triggers Block"

mitre_tactic: "TA0003"
mitre_tactic_name: "Persistence"
mitre_technique: "T1176"
mitre_technique_name: "Browser Extensions"

threat_report: "Unit42 - Browser Extension Threats 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-browser-attacker"
  - repo: "hankthebldr/cortex-malicious-agentic-pack"

infra_modules_needed:
  - base

external_tools:
  - name: cortex-browser-attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: binary
    install_inline: false

steps:
  - id: step-01
    name: "Inspect the malicious extension source tree (code-scan signal)"
    command: |
      ls -la sources/cortex-malicious-agentic-pack/chrome/ai-page-summarizer/
      jq '.permissions, .host_permissions' \
        sources/cortex-malicious-agentic-pack/chrome/ai-page-summarizer/manifest.json
    identity: container-runtime
    mitre_technique: "T1176"
    expected_detections:
      - plane: KOI
        type: Analytics
        description: "Code scan — extension manifest declares <all_urls> + cookies + webRequest + webRequestBlocking"

  - id: step-02
    name: "Attempt sideload via browser_attack_runner; expect policy block"
    command: |
      cat > /tmp/sim-browser-003-eal.yml <<'YML'
      campaign_id: CMP-BROWSER-003
      name: "Browser — risky extension install"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - chrome.cortexsim-test.invalid
      dry_run: false
      tags: [browser, extension, sideload]
      steps:
        - step_id: step-01
          plugin: browser_attack_runner
          params:
            campaign_path: scenarios/browser/campaigns/risky-extension-install.yml
            allowlist_host: chrome.cortexsim-test.invalid
            browser_channel: prisma
            headless: true
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/sim-browser-003-eal.yml --live
    identity: container-runtime
    mitre_technique: "T1176"
    expected_detections:
      - plane: BROWSER
        type: BIOC
        description: "Prisma Browser — sideloaded extension blocked by managed-extension policy"
      - plane: BROWSER
        type: Analytics
        description: "Prisma Browser — extension permission risk score exceeds threshold"
      - plane: KOI
        type: Analytics
        description: "KOI — extension manifest signature does not match approved publisher list"

  - id: step-03
    name: "Confirm post-block telemetry"
    command: |
      echo "[CortexSim] Confirm in XSIAM: extension-install-attempt event with outcome=blocked."
    identity: container-runtime
    mitre_technique: "T1176"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "Browser-attacker JSONL records install_extension outcome=blocked"

cleanup:
  commands:
    - "rm -f /tmp/sim-browser-003-eal.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-08"
tags:
  - browser
  - prisma-browser
  - extension
  - sideload
  - persistence
  - eal-plugin
