scenario_id: SIM-BROWSER-002
name: "Browser — Drive-by Download from Phishing Page"
version: "1.1"
status: active

plane: BROWSER
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-BROWSER-02
tc_ref: TC-BROWSER-02
uc_name: "Browser-Initiated Malware Download"
tc_name: "Auto-Download Triggered by Phishing Landing Page"

mitre_tactic: "TA0001"
mitre_tactic_name: "Initial Access"
mitre_technique: "T1189"
mitre_technique_name: "Drive-by Compromise"
additional_techniques:
  - technique: "T1566"
    name: "Phishing"

threat_report: "Unit42 - Drive-by Compromise Tradecraft 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-browser-attacker"

infra_modules_needed:
  - base

external_tools:
  - name: Cortex Browser Attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false
    adapter_ref: TOOL-CORTEX-BROWSER-ATTACKER
  - name: cortex-browser-attacker
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: binary
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm browser_attack_runner plugin is registered"
    command: |
      python3 -m scripts.eal_simulator.cli describe browser_attack_runner \
        | jq -e '.params_schema.properties.campaign_path'
    identity: container-runtime
    mitre_technique: "T1566"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "Pre-flight: plugin metadata visible to operator"

  - id: step-02
    name: "Drive Prisma Browser to phishing page; expect auto-download"
    command: |
      cat > /tmp/sim-browser-002-eal.yml <<'YML'
      campaign_id: CMP-BROWSER-002
      name: "Browser — drive-by download"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - phish.cortexsim-test.invalid
      dry_run: false
      tags: [browser, drive-by, download]
      steps:
        - step_id: step-01
          plugin: browser_attack_runner
          params:
            campaign_path: scenarios/browser/campaigns/drive-by-download.yml
            allowlist_host: phish.cortexsim-test.invalid
            browser_channel: prisma
            headless: true
            timeout_seconds: 90.0
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/sim-browser-002-eal.yml --live
    identity: container-runtime
    mitre_technique: "T1189"
    expected_detections:
      - plane: BROWSER
        type: BIOC
        description: "Prisma Browser — auto-download initiated by JS without user gesture"
      - plane: BROWSER
        type: Analytics
        description: "Prisma Browser — downloaded artifact MIME application/x-msdownload from non-SaaS origin"
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — file-type download policy matches downloaded artifact"

  - id: step-03
    name: "Confirm WildFire submission path on the downloaded artifact"
    command: |
      echo "[CortexSim] PB submits downloaded artifact to WildFire."
      echo "[CortexSim] Confirm in XSIAM (manual): WildFire verdict appears within MTTD target."
    identity: container-runtime
    mitre_technique: "T1189"
    expected_detections:
      - plane: BROWSER
        type: Analytics
        description: "PB → WildFire submission within download-policy MTTD"

cleanup:
  commands:
    - "rm -f /tmp/sim-browser-002-eal.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-08"
tags:
  - browser
  - prisma-browser
  - drive-by
  - phishing
  - download
  - eal-plugin
