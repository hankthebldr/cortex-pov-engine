scenario_id: SIM-KOI-004
name: "KOI — Malicious VS Code Extension Permission Escalation"
version: "1.1"
status: active

plane: KOI
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-KOI-04
tc_ref: TC-KOI-04
uc_name: "Developer-Tool Extension Risk"
tc_name: "VS Code Extension Requests Workspace + Network + Auth Permissions"

mitre_tactic: "TA0003"
mitre_tactic_name: "Persistence"
mitre_technique: "T1176"
mitre_technique_name: "Browser Extensions"
additional_techniques:
  - technique: "T1195"
    name: "Supply Chain Compromise"

threat_report: "Unit42 - VS Code Marketplace Risk 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-malicious-agentic-pack"

infra_modules_needed:
  - base

external_tools:
  - name: Cortex Malicious Agentic Pack
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false
    adapter_ref: TOOL-CORTEX-AGENTIC-PACK
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Read the malicious extension's package.json from the in-tree source"
    command: |
      # The artifact pack ships the .vsix payload as an unpacked source
      # tree under vscode/helpful-ai-assistant/ — Cortex Cloud Code
      # scans the source directly, no unzip required. tools/build-
      # artifacts.sh packs it into a real .vsix when needed.
      EXT_ROOT=sources/cortex-malicious-agentic-pack/vscode/helpful-ai-assistant
      ls -la "$EXT_ROOT"/extension/
      jq '.contributes, .activationEvents, .extensionDependencies' \
        "$EXT_ROOT"/extension/package.json
    identity: container-runtime
    mitre_technique: "T1195"
    expected_detections:
      - plane: KOI
        type: Analytics
        description: "Code scan — package.json declares activationEvents on '*' (loads on every workspace)"
      - plane: KOI
        type: BIOC
        description: "Code scan — extension reads ${HOME}/.aws/credentials and ${HOME}/.ssh/ via fs.readFile in activate()"

  - id: step-02
    name: "Emulate marketplace fetch of the .vsix over HTTPS"
    command: |
      cat > /tmp/koi-004.yml <<'YML'
      campaign_id: CMP-KOI-004
      name: "KOI — vsix fetch"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - cortexsim-canary.invalid
      dry_run: false
      tags: [koi, vscode, extension, supply-chain]
      steps:
        - step_id: step-01
          plugin: agentic_egress
          params:
            target_url: https://cortexsim-canary.invalid/vsx/
            component: vscode_ext
            artifact_name: helpful-ai-assistant
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/koi-004.yml --live
    identity: container-runtime
    mitre_technique: "T1176"
    expected_detections:
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — VS Code Marketplace fetch from non-canonical CDN"
      - plane: KOI
        type: Analytics
        description: "Extension marketplace risk score — publisher unverified + new + overbroad permissions"

  - id: step-03
    name: "Confirm post-install C2 pattern would fire on activation"
    command: |
      EXT_ROOT=sources/cortex-malicious-agentic-pack/vscode/helpful-ai-assistant
      grep -nE 'fetch|http|XMLHttpRequest|webRequest|\.aws/credentials|\.ssh/' \
        "$EXT_ROOT"/extension/dist/*.js | head -20 || true
      echo "[CortexSim] post-install activate() emits HTTP beacon to attacker C2"
    identity: container-runtime
    mitre_technique: "T1176"
    expected_detections:
      - plane: KOI
        type: BIOC
        description: "Code scan — extension activate() opens outbound HTTPS to non-Microsoft domain"
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — VS Code child process emits beacon traffic post-install"

cleanup:
  commands:
    - "rm -f /tmp/koi-004.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-05"
tags:
  - koi
  - vscode
  - extension
  - supply-chain
  - persistence
