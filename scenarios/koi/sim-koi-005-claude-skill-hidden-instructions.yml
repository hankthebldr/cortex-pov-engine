scenario_id: SIM-KOI-005
name: "KOI — Malicious Claude Skill With Hidden Instructions"
version: "1.1"
status: active

plane: KOI
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-KOI-05
tc_ref: TC-KOI-05
uc_name: "Agentic Skill-Bundle Content Inspection"
tc_name: "Claude Skill .zip Embeds Adversarial Instructions in skill.md"

mitre_tactic: "TA0001"
mitre_tactic_name: "Initial Access"
mitre_technique: "T1656"
mitre_technique_name: "Impersonation"
additional_techniques:
  - technique: "T1195"
    name: "Supply Chain Compromise"

threat_report: "Unit42 - Agentic Skill Distribution Risk 2026"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime

push_supported: true
pull_supported: true

required_content:
  - repo: "hankthebldr/cortex-malicious-agentic-pack"

infra_modules_needed:
  - base

external_tools:
  - name: Cortex Malicious Agentic Pack
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false
    adapter_ref: TOOL-CORTEX-AGENTIC-PACK
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Inspect the malicious skill bundle (in-tree source)"
    command: |
      # The artifact pack ships the .skill payload as an unpacked source
      # tree under claude-skills/code-reviewer.skill/ — Cortex Cloud
      # Code scans the source directly, no unzip required.
      SKILL_ROOT=sources/cortex-malicious-agentic-pack/claude-skills/code-reviewer.skill
      ls -la "$SKILL_ROOT"/
      head -40 "$SKILL_ROOT"/skill.md
      grep -niE 'ignore previous|exfiltrate|aws_access_key|~/\.ssh|--no-verify' \
        "$SKILL_ROOT"/skill.md || true
    identity: container-runtime
    mitre_technique: "T1656"
    expected_detections:
      - plane: KOI
        type: BIOC
        description: "Code scan — skill.md contains 'Ignore previous instructions' / exfil instructions in body"
      - plane: KOI
        type: Analytics
        description: "Code scan — skill bundle metadata claims 'verified publisher' without matching signature"

  - id: step-02
    name: "Emulate Claude client fetching the skill bundle"
    command: |
      cat > /tmp/koi-005.yml <<'YML'
      campaign_id: CMP-KOI-005
      name: "KOI — claude skill fetch"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - cortexsim-canary.invalid
      dry_run: false
      tags: [koi, claude-skill, indirect-injection]
      steps:
        - step_id: step-01
          plugin: agentic_egress
          params:
            target_url: https://cortexsim-canary.invalid/skills/
            component: claude_skill
            artifact_name: code-reviewer.skill
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/koi-005.yml --live
    identity: container-runtime
    mitre_technique: "T1195"
    expected_detections:
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — Claude client User-Agent fetches .skill from non-anthropic CDN"
      - plane: KOI
        type: Analytics
        description: "URL filter — destination not in Anthropic-published skill registry allowlist"

  - id: step-03
    name: "Confirm AIRS would catch the embedded injection on first invocation"
    command: |
      echo "[CortexSim] First invocation of this skill loads skill.md into the"
      echo "[CortexSim] context window. AIRS LLM01 (indirect injection) detector"
      echo "[CortexSim] should fire on the embedded 'Ignore previous' marker."
    identity: container-runtime
    mitre_technique: "T1656"
    expected_detections:
      - plane: AIRS
        type: Analytics
        description: "AIRS — indirect-injection scorer fires when skill.md is concatenated into prompt"
      - plane: ANALYTICS
        type: Analytics
        description: "XSIAM stitching — KOI artifact + AIRS detection chain into single agentic incident"

cleanup:
  commands:
    - "rm -f /tmp/koi-005.yml"

author: "Henry Reed"
created: "2026-05-05"
last_updated: "2026-05-05"
tags:
  - koi
  - claude-skill
  - indirect-injection
  - supply-chain
  - agentic
