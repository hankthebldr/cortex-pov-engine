scenario_id: SIM-NDR-006
name: "NDR — FTP Cleartext Egress + Credentials EAL Validation"
version: "1.0"
status: active

plane: NDR
detection_types:
  - Analytics
  - IOC
  - BIOC

uc_ref: UCS-NDR-06
tc_ref: TC-NDR-06
uc_name: "FTP App-ID + Cleartext Credential Detection"
tc_name: "Outbound FTP USER/PASS + Data Egress via STOR"

mitre_tactic: "TA0011"
mitre_tactic_name: "Command and Control"
mitre_technique: "T1071"
mitre_technique_name: "Application Layer Protocol"
additional_techniques:
  - "T1048.003"  # Exfiltration Over Unencrypted Non-C2 Protocol

threat_report: "Unit42 - Cleartext Protocol Abuse for Exfiltration"
threat_report_url: "https://unit42.paloaltonetworks.com/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base
  - ndr

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Stand up sinkhole FTP listener inside lab CIDR"
    command: |
      # Operator must pre-deploy an FTP sinkhole on 10.50.0.42:21 inside the
      # lab CIDR (any FTP server in passive mode works — pyftpdlib is the
      # canonical reference). Confirm the control port is reachable:
      nc -zv 10.50.0.42 21 || echo "[CortexSim] sinkhole reachable check (best-effort)"
    identity: container-runtime
    mitre_technique: "T1071"
    expected_detections:
      - plane: NDR
        type: Analytics
        description: "Pre-flight: FTP sinkhole reachable on port 21"
        ttp_ref: TTP-2026-0061
        detection_id: xql-pre-flight-ftp-sinkhole-reachable-on-port-21

  - id: step-02
    name: "Drive a cleartext FTP session with USER/PASS + STOR data egress"
    command: |
      cat > /tmp/ftp-egress-live.yml <<'YML'
      campaign_id: CMP-NDR-006
      name: "NDR validation — FTP cleartext credential + STOR egress"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - 10.50.0.0/24
      dry_run: false
      tags: [ndr, ftp, eal, cleartext, exfiltration]
      steps:
        - step_id: step-01
          plugin: ftp_egress
          params:
            target_host: "10.50.0.42"
            target_port: 21
            username: "cortexsim"
            password: "cortexsim-lab"
            iterations: 3
            sleep_seconds: 8
            send_stor: true
            stor_bytes: 4096
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/ftp-egress-live.yml --live
    identity: container-runtime
    mitre_technique: "T1071"
    expected_detections:
      - plane: NDR
        type: Analytics
        description: "NGFW App-ID — FTP identified on outbound session from non-admin endpoint"
        ttp_ref: TTP-2026-0061
        detection_id: xql-ngfw-app-id-ftp-outbound-session-from-non-admin-endpoint
      - plane: NDR
        type: IOC
        description: "NGFW EAL — cleartext FTP credentials observed (USER + PASS commands in session)"
        ttp_ref: TTP-2026-0061
        detection_id: ioc-user-agent-ftp-cleartext-credentials-user-pass
      - plane: NDR
        type: BIOC
        description: "NGFW EAL — outbound file transfer via FTP STOR command + 4 KB data payload"
        ttp_ref: TTP-2026-0061
        detection_id: bioc-ngfw-eal-outbound-ftp-stor-file-transfer-with-data-payload

cleanup:
  commands:
    - "rm -f /tmp/ftp-egress-live.yml"

author: "Henry Reed"
created: "2026-05-29"
last_updated: "2026-05-29"
tags:
  - ndr
  - eal
  - ftp
  - cleartext
  - exfiltration
  - app-id
