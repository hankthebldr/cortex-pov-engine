scenario_id: SIM-ITDR-004
name: "ITDR — Session Token Replay Across Geo / User-Agent"
version: "1.0"
status: active

plane: ITDR
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-ITDR-04
tc_ref: TC-ITDR-04
uc_name: "Stolen Session-Token Detection"
tc_name: "Same Session Token Used From Two Distinct Geos / Browsers Within 5 min"

mitre_tactic: "TA0006"
mitre_tactic_name: "Credential Access"
mitre_technique: "T1539"
mitre_technique_name: "Steal Web Session Cookie"
additional_techniques:
  - technique: "T1550.004"
    name: "Use Alternate Authentication Material: Web Session Cookie"
  - technique: "T1078.004"
    name: "Valid Accounts: Cloud Accounts"

threat_report: "Mandiant - APT29 OAuth Token Theft via AiTM"
threat_report_url: "https://cloud.google.com/blog/topics/threat-intelligence/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base
  - itdr

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm token_replay pattern is supported"
    command: |
      python3 -m scripts.eal_simulator.cli describe idp_signin_emulator \
        | jq -e '.eal_targets'
    identity: container-runtime
    mitre_technique: "T1539"
    expected_detections:
      - plane: ITDR
        type: BIOC
        description: "Pre-flight: idp_signin_emulator metadata visible to operator"

  - id: step-02
    name: "Issue token from US-West Chrome, replay from EU-Central curl"
    command: |
      cat > /tmp/itdr-004.yml <<'YML'
      campaign_id: CMP-ITDR-004
      name: "ITDR — Okta token replay"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - "${COLLECTOR_HOST:-collector.cortexsim-canary.invalid}"
      dry_run: false
      tags: [itdr, okta, token-replay]
      steps:
        - step_id: step-01
          plugin: idp_signin_emulator
          params:
            collector_url: "${COLLECTOR_URL:-https://collector.cortexsim-canary.invalid/idp/events}"
            provider: okta
            event_pattern: token_replay
            target_user: "ada.lovelace@cortexsim-canary.invalid"
            iterations: 1
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/itdr-004.yml --live
    identity: container-runtime
    mitre_technique: "T1539"
    expected_detections:
      - plane: ITDR
        type: Analytics
        description: "ITDR — same session_token_id observed from two geos and two user-agents within 5 min"
      - plane: ITDR
        type: BIOC
        description: "ITDR — replay_marker boolean fires explicit detection rule"

  - id: step-03
    name: "Replay 3 iterations to confirm rule deterministically fires"
    command: |
      cat > /tmp/itdr-004-rep.yml <<'YML'
      campaign_id: CMP-ITDR-004
      name: "ITDR — Okta token replay repeat"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - "${COLLECTOR_HOST:-collector.cortexsim-canary.invalid}"
      dry_run: false
      steps:
        - step_id: step-01
          plugin: idp_signin_emulator
          params:
            collector_url: "${COLLECTOR_URL:-https://collector.cortexsim-canary.invalid/idp/events}"
            provider: okta
            event_pattern: token_replay
            target_user: "ada.lovelace@cortexsim-canary.invalid"
            iterations: 3
            sleep_seconds: 10
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/itdr-004-rep.yml --live
    identity: container-runtime
    mitre_technique: "T1550.004"
    expected_detections:
      - plane: ITDR
        type: Analytics
        description: "ITDR — three independent token-replay alerts within 5 min stitch into one incident"
      - plane: ANALYTICS
        type: Analytics
        description: "XSIAM stitching — token-replay incidents grouped under same identity"

cleanup:
  commands:
    - "rm -f /tmp/itdr-004.yml /tmp/itdr-004-rep.yml"

author: "Henry Reed"
created: "2026-05-15"
last_updated: "2026-05-15"
tags:
  - itdr
  - okta
  - token-replay
  - aitm
  - eal-plugin
