scenario_id: SIM-ITDR-003
name: "ITDR — Credential Stuffing (failed-login burst across many users)"
version: "1.0"
status: active

plane: ITDR
detection_types:
  - Analytics
  - BIOC

uc_ref: UCS-ITDR-03
tc_ref: TC-ITDR-03
uc_name: "Credential-Stuffing Detection"
tc_name: "Single Source IP Tries N Distinct Identifiers In Short Window"

mitre_tactic: "TA0006"
mitre_tactic_name: "Credential Access"
mitre_technique: "T1110.004"
mitre_technique_name: "Brute Force: Credential Stuffing"

threat_report: "Verizon DBIR 2024 - Stolen Credential Reuse"
threat_report_url: "https://www.verizon.com/business/resources/reports/dbir/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

infra_modules_needed:
  - base
  - itdr

external_tools:
  - name: cortexsim-eal-cli
    source: "https://github.com/hankthebldr/cortex-pov-engine"
    type: script
    install_inline: false

steps:
  - id: step-01
    name: "Pre-flight: confirm credential_stuffing pattern is supported"
    command: |
      python3 -m scripts.eal_simulator.cli describe idp_signin_emulator \
        | jq -e '.params_schema.properties.event_pattern'
    identity: container-runtime
    mitre_technique: "T1110.004"
    expected_detections:
      - plane: ITDR
        type: BIOC
        description: "Pre-flight: idp_signin_emulator metadata visible to operator"

  - id: step-02
    name: "20 failed sign-ins from one source IP across 20 distinct identifiers"
    command: |
      cat > /tmp/itdr-003.yml <<'YML'
      campaign_id: CMP-ITDR-003
      name: "ITDR — credential stuffing 20-user burst"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - "${COLLECTOR_HOST:-collector.cortexsim-canary.invalid}"
      dry_run: false
      tags: [itdr, credential-stuffing]
      steps:
        - step_id: step-01
          plugin: idp_signin_emulator
          params:
            collector_url: "${COLLECTOR_URL:-https://collector.cortexsim-canary.invalid/idp/events}"
            provider: okta
            event_pattern: credential_stuffing
            target_user: "user000@cortexsim-canary.invalid"
            iterations: 1
            burst_count: 20
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/itdr-003.yml --live
    identity: container-runtime
    mitre_technique: "T1110.004"
    expected_detections:
      - plane: ITDR
        type: Analytics
        description: "ITDR — credential-stuffing alert: 20 failed sign-ins from same IP across distinct identifiers"
      - plane: NDR
        type: Analytics
        description: "NGFW EAL — sustained POST burst to identity log-collector"

  - id: step-03
    name: "Repeat with Microsoft event shape — 50-user burst"
    command: |
      cat > /tmp/itdr-003-ms.yml <<'YML'
      campaign_id: CMP-ITDR-003
      name: "ITDR — credential stuffing 50-user burst (Microsoft)"
      authorized_by: "domain-consultant@paloaltonetworks.com"
      simulation_authorized: true
      target_allowlist:
        - "${COLLECTOR_HOST:-collector.cortexsim-canary.invalid}"
      dry_run: false
      steps:
        - step_id: step-01
          plugin: idp_signin_emulator
          params:
            collector_url: "${COLLECTOR_URL:-https://collector.cortexsim-canary.invalid/idp/events}"
            provider: microsoft
            event_pattern: credential_stuffing
            target_user: "user000@cortexsim-canary.invalid"
            iterations: 1
            burst_count: 50
      YML
      python3 -m scripts.eal_simulator.cli run /tmp/itdr-003-ms.yml --live
    identity: container-runtime
    mitre_technique: "T1110.004"
    expected_detections:
      - plane: ITDR
        type: Analytics
        description: "ITDR — credential-stuffing alert severity escalates with 50-event burst"

cleanup:
  commands:
    - "rm -f /tmp/itdr-003.yml /tmp/itdr-003-ms.yml"

author: "Henry Reed"
created: "2026-05-15"
last_updated: "2026-05-15"
tags:
  - itdr
  - credential-stuffing
  - brute-force
  - eal-plugin
