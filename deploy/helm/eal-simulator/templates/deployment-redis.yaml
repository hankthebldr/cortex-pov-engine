{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eal-simulator.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eal-simulator.labels" . | nindent 4 }}
    cortexsim.paloaltonetworks.com/role: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "eal-simulator.selectorLabels" . | nindent 6 }}
      cortexsim.paloaltonetworks.com/role: redis
  template:
    metadata:
      labels:
        {{- include "eal-simulator.selectorLabels" . | nindent 8 }}
        cortexsim.paloaltonetworks.com/role: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eal-simulator.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eal-simulator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    {{- include "eal-simulator.selectorLabels" . | nindent 4 }}
    cortexsim.paloaltonetworks.com/role: redis
{{- end }}
