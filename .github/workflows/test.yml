name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: python (unit + api + scenario catalog)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r core/requirements.txt
          pip install pytest pytest-asyncio httpx pyyaml
      - name: Run pytest (excluding smoke)
        run: pytest tests/ -v --tb=short --ignore=tests/smoke

  go-tests:
    name: go (agent)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.21' }
      - name: Test
        run: |
          cd agent
          go vet ./...
          go test ./... -race -count=1 -v

  ui-unit:
    name: ui (vitest)
    runs-on: ubuntu-22.04
    env:
      # @playwright/test's postinstall downloads ~200 MB of browsers from
      # the Playwright CDN. The unit-test job uses vitest + jsdom and
      # never spawns a real browser — fetching them here just makes the
      # install step fail on runners without outbound access to that CDN
      # (which is what every previous CI run on this repo did, hence
      # the recurring `Process completed with exit code 1` during
      # `npm ci || npm install`). The e2e-stack job below runs
      # `npx playwright install --with-deps chromium` when it actually
      # needs the browsers.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      # Same defence-in-depth for puppeteer if it ever sneaks in as a
      # transitive dependency.
      PUPPETEER_SKIP_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: ui/package-lock.json }
      # `npm ci` is the correct install verb for CI — it refuses to
      # touch the lockfile and fails fast on drift. The previous
      # `|| npm install` fallback masked legitimate lockfile drift and
      # ran the same failing postinstall a second time, doubling the
      # job's failure budget without ever surfacing the real cause.
      - working-directory: ui
        run: npm ci
      - working-directory: ui
        run: npm test -- --coverage

  e2e-stack:
    name: e2e (smoke + playwright)
    runs-on: ubuntu-22.04
    needs: [python-tests, go-tests, ui-unit]
    env:
      # Defer the Playwright browser download to the dedicated
      # `npx playwright install --with-deps chromium` step below, so
      # that the bundle build (which only needs vite + react) doesn't
      # have to reach the Playwright CDN. Same rationale as ui-unit.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PUPPETEER_SKIP_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: ui/package-lock.json }
      - name: Install Python smoke deps
        run: pip install pytest httpx
      - name: Install UI deps
        working-directory: ui
        run: npm ci
      - name: Build UI bundle
        working-directory: ui
        run: npm run build
      - name: Copy UI to core/static
        run: |
          rm -rf core/static
          cp -r ui/dist core/static
      - name: docker compose up SimCore
        run: |
          docker compose up -d --build
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8888/api/health >/dev/null 2>&1; then
              echo "SimCore healthy after ${i}s"; break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8888/api/health || (docker compose logs simcore && exit 1)
      - name: Tier 1 smoke tests
        env:
          CORTEXSIM_SMOKE_URL: http://localhost:8888
          CORTEXSIM_OBSERVATION_STRATEGY: synthetic
        run: pytest tests/smoke -v --tb=short
      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium
      - name: Tier 2b Playwright E2E
        working-directory: ui
        env:
          CORTEXSIM_BASE_URL: http://localhost:8888
        run: npm run test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report
          retention-days: 7
      - name: docker compose logs on failure
        if: failure()
        run: docker compose logs simcore
      - name: docker compose down
        if: always()
        run: docker compose down -v

  installer-preflight:
    name: installer (preflight read-only)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/installer/preflight.sh prereqs
