title: DCSync — Domain Replication Abuse for Credential Extraction (T1003.006) — Windows Event 4662 — Replicating Directory Changes by Non-DC Principal
id: ttp-2026-0004-bioc-02
status: experimental
description: |
  DC audit log shows access to the directory replication GUID by a principal that is not a DC computer account.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    dataset = msft_windows_security
    | filter event_id = 4662
    | filter properties contains "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"
    | filter subject_user_name not_match "^[A-Z0-9-]+\\$$"  // strip computer accounts
    | filter subject_user_name not in (active_directory.dc_computer_accounts)
  ----
references:
  - https://attack.mitre.org/techniques/T1003/
author: CortexSim detection_scanner
tags:
    - attack.t1003.006
logsource:
  product: windows
  category: process_creation
