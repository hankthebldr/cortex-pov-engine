title: DCSync — Domain Replication Abuse for Credential Extraction (T1003.006) — Mimikatz dcsync Command-Line Pattern
id: ttp-2026-0004-bioc-03
status: experimental
description: |
  Process start with command line containing `dcsync` or `lsadump::dcsync`.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    preset = xdr_data
    | filter event_type = ENUM.PROCESS and event_sub_type = ENUM.PROCESS_START
    | filter action_process_image_command_line contains_any ("dcsync", "lsadump::dcsync")
  ----
