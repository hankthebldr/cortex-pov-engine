title: DCSync — Domain Replication Abuse for Credential Extraction (T1003.006) — DRSUAPI Replication Request From Non-DC Host
id: ttp-2026-0004-bioc-01
status: experimental
description: |
  A host that is NOT a domain controller initiates a DRSUAPI (MS-DRSR) RPC call to a DC requesting directory changes — the network signature of DCSync.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    preset = xdr_data
    | filter event_type = ENUM.NETWORK
    | filter event_sub_type = ENUM.NETWORK_RPC
    | filter rpc_interface_uuid = "e3514235-4b06-11d1-ab04-00c04fc2dcd2"
    | filter rpc_opnum in (0,3)  // DRSBind, DRSGetNCChanges
    | filter dst_host in (active_directory.domain_controllers)
    | filter src_host not in (active_directory.domain_controllers)
  ----
references:
  - https://attack.mitre.org/techniques/T1003/
author: CortexSim detection_scanner
tags:
    - attack.t1003.006
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    placeholder: replace_with_target_dialect_translation_of_xql
  condition: selection
falsepositives:
  - Legitimate administrative tooling that mirrors the same telemetry shape.
level: critical
