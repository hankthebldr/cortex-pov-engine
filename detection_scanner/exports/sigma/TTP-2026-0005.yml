title: Bulk Data Exfiltration via Rclone to Cloud Storage (T1567.002) — Rclone Command-Line Flag Pattern
id: ttp-2026-0005-bioc-01
status: experimental
description: |
  Any process executes with command-line containing rclone-specific flag combinations, regardless of binary name.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    preset = xdr_data
    | filter event_type = ENUM.PROCESS and event_sub_type = ENUM.PROCESS_START
    | filter (action_process_image_command_line contains_all ("--transfers","--multi-thread-streams"))
          or (action_process_image_command_line contains "--no-traverse" and action_process_image_command_line contains "copy")
          or (action_process_image_command_line matches "rclone(\\.exe)?\\s+(copy|sync|move|lsd|ls)")
  ----
references:
  - https://attack.mitre.org/techniques/T1567/
author: CortexSim detection_scanner
tags:
    - attack.t1567.002
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    placeholder: replace_with_target_dialect_translation_of_xql
  condition: selection
falsepositives:
  - Legitimate administrative tooling that mirrors the same telemetry shape.
level: high
