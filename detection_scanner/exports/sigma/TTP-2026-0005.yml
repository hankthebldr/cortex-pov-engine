title: Bulk Data Exfiltration via Rclone to Cloud Storage (T1567.002) — Outbound to Known Rclone-Backend Provider From Non-Sanctioned Host
id: ttp-2026-0005-bioc-03
status: experimental
description: |
  DNS resolution + connection to MEGA / Backblaze B2 / pCloud / yandex disk endpoints from a host where these services are not sanctioned for business use.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    preset = xdr_data
    | filter event_type = ENUM.NETWORK and event_sub_type = ENUM.NETWORK_DNS
    | filter dns_query matches_any (".*\\.mega\\.nz$",".*\\.mega\\.io$",".*\\.backblazeb2\\.com$",".*\\.pcloud\\.com$",".*\\.disk\\.yandex\\.net$")
    | filter src_host not in corp_baseline.sanctioned_cloud_storage_users
  ----
