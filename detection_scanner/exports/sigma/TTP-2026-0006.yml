title: Mass ESXi VM Encryption Orchestrated via Ansible (BlackSuit Pattern) — ESXi SSH Logon Burst — Single Source → Many Hypervisors
id: ttp-2026-0006-bioc-01
status: experimental
description: |
  ≥3 ESXi hosts receive successful SSH logon from the same source IP within 5 minutes.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    dataset = esxi_syslog
    | filter event_source = "sshd" and event_message contains "Accepted"
    | bin _time span=5m
    | comp count_distinct(hostname) as host_count by source_ip, _time
    | filter host_count >= 3
  ----
references:
  - https://attack.mitre.org/techniques/T1021/
author: CortexSim detection_scanner
tags:
    - attack.t1021.004
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    placeholder: replace_with_target_dialect_translation_of_xql
  condition: selection
falsepositives:
  - Legitimate administrative tooling that mirrors the same telemetry shape.
level: critical
