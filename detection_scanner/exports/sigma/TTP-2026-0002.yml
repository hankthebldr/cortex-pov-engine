title: "LSASS Memory Credential Dump via MiniDumpWriteDump (T1003.001) \u2014 LSASS Handle Open With Sensitive Access Rights"
id: ttp-2026-0002-bioc-01
status: experimental
description: |
  Any process (excluding allowlisted agents) opens a handle to lsass.exe with PROCESS_VM_READ (0x0010) or PROCESS_DUP_HANDLE (0x0040) access rights.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    preset = xdr_data
    | filter event_type = ENUM.PROCESS
    | filter event_sub_type = ENUM.PROCESS_ACCESS
    | filter target_process_name = "lsass.exe"
    | filter requested_access bitand 0x0410 != 0
    | filter actor_process_image_name not in ("MsMpEng.exe", "cyserver.exe", "WmiPrvSE.exe")
  ----
references:
  - https://attack.mitre.org/techniques/T1003/
author: CortexSim detection_scanner
tags:
    - attack.t1003.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    placeholder: replace_with_target_dialect_translation_of_xql
  condition: selection
falsepositives:
  - Legitimate administrative tooling that mirrors the same telemetry shape.
level: critical
