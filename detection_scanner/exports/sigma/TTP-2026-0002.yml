title: "LSASS Memory Credential Dump via MiniDumpWriteDump (T1003.001) \u2014 comsvcs.dll MiniDump LOLBin Execution"
id: ttp-2026-0002-bioc-02
status: experimental
description: |
  rundll32.exe invokes comsvcs.dll MiniDump export — a well-known living-off-the-land credential dump vector.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    preset = xdr_data
    | filter event_type = ENUM.PROCESS
    | filter event_sub_type = ENUM.PROCESS_START
    | filter actor_process_image_name = "rundll32.exe"
    | filter action_process_image_command_line contains_any ("comsvcs.dll MiniDump", "comsvcs.dll, MiniDump", "comsvcs MiniDump")
  ----
references:
  - https://attack.mitre.org/techniques/T1003/
author: CortexSim detection_scanner
tags:
    - attack.t1003.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    placeholder: replace_with_target_dialect_translation_of_xql
  condition: selection
falsepositives:
  - Legitimate administrative tooling that mirrors the same telemetry shape.
level: critical
