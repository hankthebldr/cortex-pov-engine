title: AWS IAM Access Key Abuse — Discovery + S3 Object Exfiltration — Long-Lived IAM User Key Used From Outside Known ASN
id: ttp-2026-0003-bioc-03
status: experimental
description: |
  Access key auth observed from an ASN never seen for this identity in 90 days.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    dataset = cloud_audit_logs
    | filter cloud_provider = "AWS" and additional_event_data.MFAUsed = "No"
    | filter user_identity.type = "IAMUser"
    | enrich asn = geoip(source_ip).asn
    | filter asn not in user_baseline.asns_90d[user_identity.arn]
  ----
