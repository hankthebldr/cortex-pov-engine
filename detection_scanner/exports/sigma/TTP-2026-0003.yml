title: AWS IAM Access Key Abuse — Discovery + S3 Object Exfiltration — S3 Bulk Object Download by IAM User With No Prior Read Pattern
id: ttp-2026-0003-bioc-02
status: experimental
description: |
  An IAM user (not a service role) issues ≥50 GetObject calls against a single bucket within 5 minutes, when historical baseline shows <5/day.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    dataset = cloud_audit_logs
    | filter cloud_provider = "AWS" and event_source = "s3.amazonaws.com" and event_name = "GetObject"
    | filter user_identity.type = "IAMUser"
    | bin _time span=5m
    | comp count() as get_count by user_identity.arn, request_parameters.bucketName, _time
    | filter get_count >= 50 and get_count > 10 * baseline.daily_avg[user_identity.arn, request_parameters.bucketName]
  ----
references:
  - https://attack.mitre.org/techniques/T1530/
author: CortexSim detection_scanner
tags:
    - attack.t1530
    - attack.t1567.002
logsource:
  product: aws
  category: process_creation
detection:
  selection:
    placeholder: replace_with_target_dialect_translation_of_xql
  condition: selection
falsepositives:
  - Legitimate administrative tooling that mirrors the same telemetry shape.
level: critical
