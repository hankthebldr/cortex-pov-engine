title: Help-Desk MFA Reset via Voice Impersonation (Muddled Libra Pattern) — Help-Desk Admin Modifies Authentication for User Outside Their Span
id: ttp-2026-0001-bioc-02
status: experimental
description: |
  Help-desk role performs a factor reset for a user whose department or geo is outside the help-desk admin's usual support population.
  Canonical Cortex XQL body follows (preserve verbatim for XSIAM):
  ----
    dataset = saas_okta_raw
    | filter event_type = "user.account.reset_factors"
    | enrich actor_geo = lookup(actor_user_id, employee_directory.geo)
    | enrich target_geo = lookup(target_user_id, employee_directory.geo)
    | where actor_geo != target_geo or target_user.privileged = true
  ----
references:
  - https://attack.mitre.org/techniques/T1556/
author: CortexSim detection_scanner
tags:
    - attack.t1556.006
