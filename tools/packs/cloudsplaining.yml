adapter_id: TOOL-CLOUDSPLAINING
name: "Cloudsplaining"
version: "0.7"

tier: 4
category: cloud-container

upstream:
  repo: https://github.com/salesforce/cloudsplaining
  license: "Apache-2.0"
  attribution: "Salesforce"

