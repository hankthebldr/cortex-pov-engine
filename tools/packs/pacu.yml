adapter_id: TOOL-PACU
name: Pacu
version: "1.5.6"

tier: 4
category: cloud-container

upstream:
  repo: https://github.com/RhinoSecurityLabs/pacu
  license: BSD-3-Clause
  attribution: Rhino Security Labs

cortex_signal:
  planes:
    - CDR
    - CLOUD_APP
  expected_techniques:
    - T1078.004  # Valid Accounts: Cloud Accounts
    - T1580      # Cloud Infrastructure Discovery
    - T1530      # Data from Cloud Storage
    - T1098.001  # Account Manipulation: Additional Cloud Credentials

safety_class: dual-use-lab-only

install:
  runtime_install_command: "command -v pacu >/dev/null 2>&1 || pip3 install --no-input pacu==1.5.6"
  binary: pacu

invoke:
  target_platform: linux
  # Pacu is interactive by default but supports script-driven runs via
  # `--module-name` + `--exec --data-args`. The adapter assumes the
  # operator has pre-seeded an AWS profile (named `cortexsim-lab`) in
  # the environment running the scenario step.
  run_template: "{binary} --session {session_name} --module-name {module_name} --exec"
  default_args:
    session_name: "cortexsim-lab"
    module_name: "iam__enum_users_roles_policies_groups"
  identity_required: root

cleanup:
  commands:
    - "rm -rf ~/.local/share/pacu/sessions/cortexsim-lab-*"

ttp_refs:
  - TTP-2026-0003  # AWS IAM Access Key Abuse — pacu's bread and butter

equivalents:
  - TOOL-SCOUTSUITE
  - TOOL-CLOUDSPLAINING

author: Henry Reed
created: "2026-05-20"
last_updated: "2026-05-20"
tags:
  - aws
  - cloud-exploitation
  - iam-abuse
  - lateral-cloud
