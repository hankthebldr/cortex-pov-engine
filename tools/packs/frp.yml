adapter_id: TOOL-FRP
name: "frp"
version: "0.58.0"

tier: 3
category: network-scan

upstream:
  repo: https://github.com/fatedier/frp
  license: "Apache-2.0"
  attribution: "fatedier"

cortex_signal:
  planes:
    - NDR
  expected_techniques:
    - T1572
    - T1090

safety_class: dual-use-lab-only

install:
  iac_module: ndr
  content_library_entry:
    name: frp
    repo: fatedier/frp
    install: git-clone
  binary: "frpc"

invoke:
  target_platform: linux
  run_template: "{binary} -c {config}"
  default_args:
    config: "frpc.toml"
  identity_required: root

cleanup:
  commands:
    - "rm -rf /tmp/cortexsim-frp-* 2>/dev/null || true"

ttp_refs: []
equivalents: []

author: Henry Reed
created: "2026-06-02"
last_updated: "2026-06-02"
tags:
  - phase-c
  - network-scan
