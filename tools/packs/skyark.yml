adapter_id: TOOL-SKYARK
name: "SkyArk"
version: "1.0"

tier: 4
category: cloud-container

upstream:
  repo: https://github.com/cyberark/SkyArk
  license: "LicenseRef-CyberArk"
  attribution: "CyberArk"

cortex_signal:
  planes:
    - CDR
  expected_techniques:
    - T1078.004

safety_class: dual-use-lab-only

install:
  runtime_install_command: "test -d /tmp/SkyArk || git clone --depth 1 https://github.com/cyberark/SkyArk /tmp/SkyArk"
  binary: "pwsh /tmp/SkyArk/SkyArk.ps1"

invoke:
  target_platform: linux
  run_template: "{binary} -{scanner}"
  default_args:
    scanner: "AWStealth"
  identity_required: root

cleanup:
  commands:
    - "rm -rf /tmp/cortexsim-skyark-* 2>/dev/null || true"

ttp_refs: []
equivalents: []

author: Henry Reed
created: "2026-06-02"
last_updated: "2026-06-02"
tags:
  - phase-c
  - cloud-container
