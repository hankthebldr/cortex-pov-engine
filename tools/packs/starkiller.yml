adapter_id: TOOL-STARKILLER
name: "Starkiller"
version: "2.x"

tier: 3
category: c2-framework

upstream:
  repo: https://github.com/BC-SECURITY/Starkiller
  license: "BSD-3-Clause"
  attribution: "BC Security"

cortex_signal:
  planes:
    - EDR
  expected_techniques:
    - T1059

safety_class: c2-framework

install:
  iac_module: edr
  content_library_entry:
    name: starkiller
    repo: BC-SECURITY/Starkiller
    install: git-clone
  binary: "starkiller"

invoke:
  target_platform: linux
  run_template: "{binary}"
  default_args: {}
  identity_required: root

cleanup:
  commands:
    - "rm -rf /tmp/cortexsim-starkiller-* 2>/dev/null || true"

ttp_refs: []
equivalents: []

